name: Sync docs

on:
  push:
    branches: [master]
    paths:
      - "*.js"
      - "images/**"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy JS files to docs/
        run: cp qp-memory.wc.js qp-memory.dictionary.js qp-memory.styles.js qp-memory.images.js docs/

      - name: Copy images to docs/images/
        run: cp -r images/* docs/images/

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet docs/ || (git add docs/ && git commit -m "chore: sync JS and images to docs/" && git push)
